name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun i

      - name: Run tests
        run: bun test
        env:
          # Optional. When set, the smoke suite (test/smoke/*) hits the live
          # Perigon API. If unset, those tests auto-skip via `test.skipIf`.
          PERIGON_API_KEY: ${{ secrets.PERIGON_API_KEY }}

      - name: Build
        run: bun run build
        env:
          CLOUDFLARE_ENV: production
          VITE_TURNSTILE_SITE_KEY: "0x4AAAAAABihR9-NN72ssFjf"
          VITE_USE_TURNSTILE: "true"

      - name: Deploy
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ENV: production
