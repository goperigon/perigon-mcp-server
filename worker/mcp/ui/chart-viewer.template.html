<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Signal Insights Charts</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        background: transparent;
        color: var(--color-text-primary, light-dark(#333, #e0e0e0));
        font-family: var(
          --font-sans,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif
        );
        font-size: 13px;
      }

      body {
        padding: 4px 0;
      }
      body.collapsed {
        display: none !important;
      }

      #charts {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .chart-wrap {
        border-radius: 8px;
        overflow: hidden;
      }

      .chart-title {
        padding: 6px 8px 2px;
        font-size: 12px;
        font-weight: 500;
        opacity: 0.7;
      }

      .chart-echart {
        width: 100%;
        height: 300px;
      }

      .chart-img img {
        width: 100%;
        display: block;
        border-radius: 6px;
      }

      .chart-unknown {
        padding: 8px;
        font-size: 11px;
        opacity: 0.4;
        font-family: var(--font-mono, monospace);
        white-space: pre-wrap;
        word-break: break-all;
      }
    </style>
  </head>
  <body class="collapsed">
    <div id="charts"></div>
    <script src="__APPS_BASE_URL__/apps/chart-viewer.js"></script>
  </body>
</html>
