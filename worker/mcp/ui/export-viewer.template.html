<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Signal Insights Export Viewer</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        background: transparent;
        color: var(--color-text-primary, light-dark(#333, #e0e0e0));
        font-family: var(
          --font-sans,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif
        );
        font-size: var(--font-size-base, 14px);
      }

      body {
        padding: 4px 0;
      }
      body.collapsed {
        display: none !important;
      }

      .summary {
        padding: 4px 8px 8px;
        font-size: 12px;
        opacity: 0.6;
      }

      .table-scroll {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: var(--font-size-sm, 13px);
      }

      thead th {
        position: sticky;
        top: 0;
        background: light-dark(#f5f5f5, #2a2a2a);
        font-weight: 600;
        text-align: left;
        padding: 6px 10px;
        border-bottom: 2px solid light-dark(#ddd, #444);
        white-space: nowrap;
      }

      tbody td {
        padding: 5px 10px;
        border-bottom: 1px solid light-dark(#eee, #333);
        max-width: 300px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      tbody tr:hover {
        background: light-dark(rgba(0, 0, 0, 0.03), rgba(255, 255, 255, 0.03));
      }

      .cell-null {
        opacity: 0.3;
        font-style: italic;
      }

      .cell-object {
        font-family: var(--font-mono, monospace);
        font-size: 11px;
        opacity: 0.8;
      }

      .empty-state {
        padding: 24px 8px;
        text-align: center;
        opacity: 0.4;
        font-size: 13px;
      }

      .export-title {
        padding: 6px 8px 2px;
        font-size: inherit;
        font-weight: 600;
        line-height: 1.3;
        word-break: break-word;
      }

      .expand-bar {
        padding: 6px 8px;
        text-align: center;
        font-size: 12px;
        cursor: pointer;
        opacity: 0.6;
        border-top: 1px solid light-dark(#eee, #333);
      }
      .expand-bar:hover {
        opacity: 1;
        background: light-dark(rgba(0, 0, 0, 0.03), rgba(255, 255, 255, 0.03));
      }
    </style>
  </head>
  <body class="collapsed">
    <div id="export"></div>
    <script src="__APPS_BASE_URL__/apps/export-viewer.js"></script>
  </body>
</html>
