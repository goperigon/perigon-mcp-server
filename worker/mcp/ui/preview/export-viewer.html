<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Export Viewer Preview</title>
    <style>
      body {
        font-family: system-ui;
        margin: 40px auto;
        max-width: 800px;
      }
      iframe {
        width: 100%;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h2>Export Viewer Preview</h2>
    <iframe
      id="viewer"
      src="../export-viewer.html"
      style="height: 600px"
    ></iframe>

    <script>
      const iframe = document.getElementById("viewer");

      // Mock data — adjust as needed
      const mockExport = {
        name: "Weekly Tech News Export",
        columns: ["articles", "createdAt", "data", "uuid"],
        rowCount: 100,
        preview: Array.from({ length: 30 }, (_, i) => ({
          articles: `{"e857ae4276bb460e90f45fd7e4b16616": {"url": "https://www.techloy.com/week-${i}"}`,
          createdAt: new Date(2026, 4, 22, 9 + i).toISOString(),
          data: `{"url": "https://example.com/article-${i}", "title": "Article ${i + 1}"}`,
          uuid: `e857ae4276bb460e90f45fd7e4b16616-${i}`,
        })),
      };

      iframe.addEventListener("load", () => {
        // Respond to ui/initialize
        window.addEventListener("message", (ev) => {
          const msg = ev.data;
          if (!msg || msg.jsonrpc !== "2.0") return;

          // Reply to ui/initialize request
          if (msg.id !== undefined && msg.method === "ui/initialize") {
            iframe.contentWindow.postMessage(
              {
                jsonrpc: "2.0",
                id: msg.id,
                result: { hostContext: {} },
              },
              "*",
            );

            // Send mock tool result after a short delay
            setTimeout(() => {
              iframe.contentWindow.postMessage(
                {
                  jsonrpc: "2.0",
                  method: "ui/notifications/tool-result",
                  params: { structuredContent: { export: mockExport } },
                },
                "*",
              );
            }, 100);
          }

          // Handle size-changed to auto-resize iframe
          if (
            msg.method === "ui/notifications/size-changed" &&
            msg.params?.height
          ) {
            iframe.style.height = Math.max(100, msg.params.height + 20) + "px";
          }
        });
      });
    </script>
  </body>
</html>
